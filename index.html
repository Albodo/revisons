<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Révision Pub Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.4rem;
      color: #e94560;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 2.5rem;
      font-size: 0.9rem;
    }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: #5a1a1a;
      border: 1px solid #e94560;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      color: #f88;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #error-banner code {
      background: #3a0a0a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    /* ── Sections ── */
    .section {
      background: #16213e;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      border: 1px solid #0f3460;
    }

    .section-title {
      font-size: 1.3rem;
      color: #e94560;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── Carousel ── */
    .carousel-wrapper {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .carousel-btn {
      background: #0f3460;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-btn:hover { background: #e94560; transform: scale(1.1); }

    .carousel-track { flex: 1; overflow: hidden; }

    .cards-row {
      display: flex;
      gap: 1rem;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── Card ── */
    .card {
      flex-shrink: 0;
      background: #0f3460;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

    .card-img-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      background: #1a1a2e;
      overflow: hidden;
    }
    .card-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,30,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s;
      font-size: 0.85rem;
      color: #adf;
      text-align: center;
      padding: 0.6rem;
    }
    .card.revealed .card-overlay { opacity: 1; }

    .card-caption {
      padding: 0.7rem 0.9rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #cce;
      text-align: center;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .caption-text { transition: filter 0.3s; }
    .card.hidden-caption .caption-text { filter: blur(6px); }

    /* ── Controls bar ── */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .page-indicator { font-size: 0.85rem; color: #888; }

    .toggle-btn {
      background: transparent;
      border: 1px solid #0f3460;
      color: #aaa;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .toggle-btn:hover, .toggle-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .kbd-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin-top: 2rem;
    }
    .kbd-hint kbd {
      background: #0f3460;
      padding: 2px 6px;
      border-radius: 4px;
      color: #aaa;
    }

    /* ── Image placeholder ── */
    .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f3460;
      color: #445;
      font-size: 0.8rem;
      text-align: center;
      padding: 0.5rem;
      gap: 0.3rem;
    }
  </style>
</head>
<body>

<h1>🎙️ Révision Pub Quiz</h1>
<p class="subtitle">Clique sur une carte pour voir l'indice · Flèches ou clavier pour naviguer</p>

<div id="error-banner"></div>
<div id="app"></div>

<p class="kbd-hint" id="kbd-hint" style="display:none">
  Navigation : <kbd>←</kbd> <kbd>→</kbd> dans la section active · Clic sur une carte = afficher l'indice
</p>

<script>
  const carousels = {};
  let activeCarousel = null;

  // ── Fetch + parse data.xml ────────────────────────────
  fetch('data.xml')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(xml => {
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const parseError = doc.querySelector('parsererror');
      if (parseError) throw new Error('XML invalide : ' + parseError.textContent.trim().slice(0, 200));
      buildApp(doc);
    })
    .catch(err => {
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      banner.innerHTML = `
        <strong>⚠️ Impossible de charger data.xml</strong><br><br>
        ${err.message}<br><br>
        Les navigateurs bloquent <code>fetch()</code> en protocole <code>file://</code>.
        Lance le serveur local inclus :<br><br>
        &nbsp;&nbsp;1. Double-clique sur <code>lancer.bat</code><br>
        &nbsp;&nbsp;2. Ouvre <code>http://localhost:8000/pubquiz.html</code>
      `;
    });

  // ── Build DOM from parsed XML ─────────────────────────
  function buildApp(doc) {
    const app = document.getElementById('app');
    app.innerHTML = '';

    doc.querySelectorAll('section').forEach(sec => {
      const id    = sec.getAttribute('id');
      const icon  = sec.getAttribute('icon') || '';
      const titre = sec.getAttribute('titre') || id;
      const cartes = Array.from(sec.querySelectorAll('carte'));

      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = `
        <div class="section-title"><span>${icon}</span> ${titre}</div>
        <div class="carousel-wrapper" id="wrapper-${id}">
          <button class="carousel-btn prev-btn" data-carousel="${id}">&#8592;</button>
          <div class="carousel-track" id="track-${id}">
            <div class="cards-row" id="row-${id}"></div>
          </div>
          <button class="carousel-btn next-btn" data-carousel="${id}">&#8594;</button>
        </div>
        <div class="controls-bar">
          <span class="page-indicator" id="indicator-${id}"></span>
          <button class="toggle-btn" id="blur-btn-${id}">🙈 Cacher les noms</button>
        </div>
      `;
      app.appendChild(section);

      const row = section.querySelector(`#row-${id}`);
      cartes.forEach(c => {
        const img    = c.querySelector('image')?.textContent.trim() || '';
        const legende = c.querySelector('legende')?.textContent.trim() || '';
        const indice  = c.querySelector('indice')?.textContent.trim() || '';
        row.appendChild(makeCard(img, legende, indice));
      });

      // Events
      const wrapper = section.querySelector(`#wrapper-${id}`);
      wrapper.addEventListener('mouseenter', () => activeCarousel = id);
      wrapper.addEventListener('mouseleave', () => activeCarousel = null);
      wrapper.querySelector('.prev-btn').addEventListener('click', () => navigate(id, -1));
      wrapper.querySelector('.next-btn').addEventListener('click', () => navigate(id,  1));
      section.querySelector(`#blur-btn-${id}`).addEventListener('click', function () {
        toggleBlur(id, this);
      });

      initCarousel(id, row);
    });

    document.getElementById('kbd-hint').style.display = 'block';
  }

  // ── Build a single card element ───────────────────────
  function makeCard(imgSrc, legende, indice) {
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', () => card.classList.toggle('revealed'));

    const wrap = document.createElement('div');
    wrap.className = 'card-img-wrap';

    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = legende;
      img.addEventListener('error', () => showPlaceholder(wrap, legende));
      wrap.appendChild(img);
    } else {
      showPlaceholder(wrap, legende);
    }

    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    overlay.textContent = indice;
    wrap.appendChild(overlay);

    const caption = document.createElement('div');
    caption.className = 'card-caption';
    caption.innerHTML = `<span class="caption-text">${legende}</span>`;

    card.appendChild(wrap);
    card.appendChild(caption);
    return card;
  }

  function showPlaceholder(wrap, label) {
    if (wrap.querySelector('.img-placeholder')) return;
    const ph = document.createElement('div');
    ph.className = 'img-placeholder';
    ph.innerHTML = `<span style="font-size:2rem">🖼️</span><span>${label}</span>`;
    wrap.appendChild(ph);
  }

  // ── Carousel logic ────────────────────────────────────
  function initCarousel(id, row) {
    const track = document.getElementById('track-' + id);
    const cards = Array.from(row.querySelectorAll('.card'));
    carousels[id] = { index: 0, cards, row, track };
    updateCarousel(id);
  }

  function getVisible(id) {
    const w = carousels[id].track.clientWidth;
    if (w < 500) return 1;
    if (w < 850) return 2;
    return 3;
  }

  function updateCarousel(id) {
    const c = carousels[id];
    const visible  = getVisible(id);
    const maxIndex = Math.max(0, c.cards.length - visible);
    c.index = Math.min(c.index, maxIndex);

    const gap   = 16;
    const trackW = c.track.clientWidth;
    const cardW  = (trackW - gap * (visible - 1)) / visible;
    c.cards.forEach(card => card.style.width = cardW + 'px');

    c.row.style.transform = `translateX(-${c.index * (cardW + gap)}px)`;

    const page  = Math.floor(c.index / visible) + 1;
    const pages = Math.ceil(c.cards.length / visible);
    document.getElementById('indicator-' + id).textContent = `${page} / ${pages}`;
  }

  function navigate(id, dir) {
    const c       = carousels[id];
    const visible = getVisible(id);
    c.index = Math.max(0, Math.min(c.index + dir * visible, c.cards.length - visible));
    updateCarousel(id);
  }

  function toggleBlur(id, btn) {
    const isHiding = btn.classList.toggle('active');
    carousels[id].cards.forEach(card => card.classList.toggle('hidden-caption', isHiding));
    btn.textContent = isHiding ? '👁️ Afficher les noms' : '🙈 Cacher les noms';
  }

  // ── Keyboard ──────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (!activeCarousel) return;
    if (e.key === 'ArrowLeft')  navigate(activeCarousel, -1);
    if (e.key === 'ArrowRight') navigate(activeCarousel,  1);
  });

  window.addEventListener('resize', () => {
    Object.keys(carousels).forEach(id => updateCarousel(id));
  });
</script>
</body>
</html>
